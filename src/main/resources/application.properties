spring.application.name=cydrownia-app
server.port=8080
spring.application.admin.enabled=false
spring.application.admin.jmx-name=org.springframework.boot:type=Admin,name=SpringApplication2
spring.messages.basename=messages

spring.datasource.url= jdbc:mysql://localhost:3306/oskarek
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=mysql

spring.jpa.show-sql=true
management.endpoint.shutdown.enabled=true
management.endpoints.web.exposure.include=*
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Application for OSKAREK driving school
info.app.version=67.0.1